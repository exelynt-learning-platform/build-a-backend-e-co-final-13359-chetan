# Server
server.port=8080

# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:yourpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
# FIX (CRITICAL VULNERABILITY): Moved JWT secret to environment variable.
# Set JWT_SECRET in your environment (min 32 chars for HS256).
# The fallback value here is for local dev only — never use a weak secret in production.
app.jwt.secret=${JWT_SECRET:ThisIsAVerySecretKeyForJWTTokenGenerationAndItMustBeLongEnough256Bits}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Stripe Payment Gateway
# FIX: Moved Stripe secret key to environment variable — never hardcode API keys.
stripe.api.key=${STRIPE_API_KEY:sk_test_your_stripe_key_here}

# PayPal Payment Gateway
# FIX: Moved PayPal credentials to environment variables.
paypal.client.id=${PAYPAL_CLIENT_ID:your_paypal_client_id}
paypal.client.secret=${PAYPAL_CLIENT_SECRET:your_paypal_client_secret}
paypal.mode=${PAYPAL_MODE:sandbox}

# Logging
logging.level.com.ecommerce=DEBUG
